<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ポモドーロタイマー</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="mode-work">
  <div class="app">
    <!-- SCR-001 メイン画面 -->
    <div id="mainScreen" class="card">
      <h1 id="lblTitle">ポモドーロタイマー</h1>

      <span id="lblMode">停止中</span>
      <span id="lblTimer">25:00</span>
      <span id="lblSession">今日の完了回数：0回</span>

      <div class="button-group">
        <button type="button" id="btnStart">開始</button>
        <button type="button" id="btnPause">一時停止</button>
        <button type="button" id="btnReset">リセット</button>
      </div>

      <button type="button" id="btnSetting">設定</button>

      <footer class="app-footer">
        <p class="app-credit">Created by glbyymt</p>
        <p class="app-copyright">&copy; 2026 glbyymt. All rights reserved.</p>
      </footer>
    </div>

    <!-- SCR-002 設定画面 -->
    <div id="settingsScreen" class="card">
      <h2>設定</h2>

      <div class="setting-row">
        <label for="txtWorkTime">作業時間</label>
        <div class="input-wrap">
          <input type="number" id="txtWorkTime" min="1" max="120" value="25">
          <span class="unit">分</span>
        </div>
      </div>

      <div class="setting-row">
        <label for="txtShortBreak">短休憩時間</label>
        <div class="input-wrap">
          <input type="number" id="txtShortBreak" min="1" max="60" value="5">
          <span class="unit">分</span>
        </div>
      </div>

      <div class="setting-row">
        <label for="txtLongBreak">長休憩時間</label>
        <div class="input-wrap">
          <input type="number" id="txtLongBreak" min="1" max="120" value="15">
          <span class="unit">分</span>
        </div>
      </div>

      <div class="setting-row">
        <label for="txtLongBreakCycle">長休憩までの回数</label>
        <div class="input-wrap">
          <input type="number" id="txtLongBreakCycle" min="1" max="10" value="4">
          <span class="unit">回</span>
        </div>
      </div>

      <div class="button-group">
        <button type="button" id="btnSave">保存</button>
        <button type="button" id="btnCancel">キャンセル</button>
      </div>
    </div>

    <div id="messageArea" role="status" aria-live="polite"></div>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
